services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: reelsearch
      POSTGRES_USER: reelsearch
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelsearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://reelsearch:password@db:5432/reelsearch
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/code/app
      - thumbnails:/data/thumbnails

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  pgdata:
  thumbnails:
